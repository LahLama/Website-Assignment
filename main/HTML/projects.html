<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects</title>
    
    <link rel="stylesheet" href="../CSS/prefabs.css">
    <link rel="stylesheet" href="../CSS/carousel.css">
    <link rel="stylesheet" href="../CSS/projects.css">
    
    <script src="../JS/CarouselBase.js" defer></script>
    <script src="../JS/projects/codedCarousel.js" defer></script>
    <script src="../JS/projects/practicalsCarousel.js" defer></script>

    <script src="../JS/htmlHeader.js" defer></script>
    <script src="../JS/htmlFooter.js" defer></script>

</head>
<body>

    <header id="autoHTML">

    </header>
    <main>
        <section id="CarouselContainer">
            <section id="codedContainer" class="classContainer xen">
                <h3 title=""> Coded Projects </h3>
                <section class="presentCard">
                    <button id="backButton_coded" class="pressButton backButton"> <img src="/ASSETS/IMAGES/button_60x40.png" alt="" /> </button>
                    <div id="descriptionArea_coded" class=" descriptionArea"> </div>
                    <button id="forwardButton_coded" class="pressButton forwardButton"><img src="/ASSETS/IMAGES/button_60x40.png" alt="" /></button>
                </section>
            </section>
        
            <section id="practicalsContainer" class="classContainer">
                <h3 title=""> Practical Projects </h3>
                <section class="presentCard">
                    <button id="backButton_practicals" class="pressButton backButton"><img src="/ASSETS/IMAGES/button_60x40.png"
                            alt="" /></button>
                    <div id="descriptionArea_practicals" class="descriptionArea"></div>
                    <button id="forwardButton_practicals" class="pressButton forwardButton"><img
                            src="/ASSETS/IMAGES/button_60x40.png" alt="" /></button>
                </section>
            </section>
        </section>

        <section id="TimelineContainer" class="timelineCard classContainer">
            <h3 title=""> Timeline </h3>
            <div class="infoArea center">
                <p>Short description of the timeline including roles, times etc</p>
            </div>
        </section>
    
    </main>
